<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>꽃말 사전 — 마음을 담은 꽃 추천</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800;900&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <script id="tw-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary":                  "#C8625A",
            "on-primary":               "#ffffff",
            "primary-container":        "#FDECEA",
            "on-primary-container":     "#7A3430",
            "primary-fixed-dim":        "#F5B8B4",
            "secondary":                "#7B9E7A",
            "on-secondary":             "#ffffff",
            "secondary-container":      "#EDF4ED",
            "on-secondary-container":   "#2D5C2C",
            "tertiary":                 "#8B6914",
            "tertiary-container":       "#FFF3D9",
            "on-tertiary-container":    "#4A3800",
            "surface":                  "#FFF8F5",
            "surface-bright":           "#FFFCFA",
            "surface-dim":              "#E8DDD9",
            "surface-container-lowest": "#FFFFFF",
            "surface-container-low":    "#F7F1EE",
            "surface-container":        "#F0EAE7",
            "surface-container-high":   "#E8E0DD",
            "surface-container-highest":"#E1D8D5",
            "on-surface":               "#1A1414",
            "on-surface-variant":       "#6B5F5C",
            "outline":                  "#968B88",
            "outline-variant":          "#DDD5D1",
            "background":               "#FFF8F5",
          },
          fontFamily: {
            "headline": ["'Epilogue'", "sans-serif"],
            "body":     ["'Be Vietnam Pro'", "sans-serif"],
          },
          borderRadius: {
            "DEFAULT": "12px",
            "lg":      "20px",
            "xl":      "28px",
            "2xl":     "36px",
            "full":    "9999px",
          },
        }
      }
    }
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Be Vietnam Pro', sans-serif; background: #FFF8F5; }
    h1, h2, h3 { font-family: 'Epilogue', sans-serif; }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block; vertical-align: middle;
    }

    /* Glass nav */
    .glass-nav {
      background: rgba(255, 248, 245, 0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* No scrollbar */
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    /* Custom scrollbar (where visible) */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #DDD5D1; border-radius: 10px; }

    /* Toggle switch */
    .toggle-track {
      position: relative; width: 44px; height: 25px;
      background: #DDD5D1; border-radius: 9999px;
      cursor: pointer; transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-track::after {
      content: ''; position: absolute;
      width: 19px; height: 19px; border-radius: 50%;
      background: white; top: 3px; left: 3px;
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 1px 6px rgba(0,0,0,0.18);
    }
    #artificialToggle:checked + .toggle-track { background: #7B9E7A; }
    #artificialToggle:checked + .toggle-track::after { transform: translateX(19px); }

    /* Views */
    .view { display: none; }
    .view.active { display: block; animation: fadeSlide 0.28s ease; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }

    /* Sidebar active link */
    .sidebar-link {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 10px 16px; border-radius: 999px;
      font-size: 14px; font-weight: 500;
      color: #6B5F5C; transition: all 0.2s; text-align: left;
      cursor: pointer; background: none; border: none;
    }
    .sidebar-link:hover { background: #F0EAE7; color: #1A1414; }
    .sidebar-link.active {
      background: linear-gradient(135deg, #C8625A, #F5B8B4);
      color: white; font-weight: 600;
      box-shadow: 0 4px 14px rgba(200,98,90,0.3);
    }
    .sidebar-link.active .material-symbols-outlined { color: white; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(26,20,20,0.5);
      display: flex; align-items: center; justify-content: center;
      padding: 20px; opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal-box {
      background: #FFFFFF; border-radius: 28px;
      width: 100%; max-width: 520px; max-height: 90vh;
      overflow-y: auto; position: relative;
      transform: translateY(24px) scale(0.96);
      transition: transform 0.3s cubic-bezier(.32,.72,0,1);
    }
    .modal-overlay.open .modal-box { transform: none; }

    /* Flower card emoji hover */
    .flower-card:hover .flower-emoji { transform: scale(1.12); }
    .flower-emoji { transition: transform 0.45s cubic-bezier(.34,1.56,.64,1); display: block; }

    /* Season scroll snap */
    #seasonalScroll { scroll-snap-type: x mandatory; }
    #seasonalScroll > * { scroll-snap-align: start; }

    /* Clamp */
    .line-clamp-1 { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
    .line-clamp-2 { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  </style>
</head>

<body class="bg-background text-on-surface selection:bg-primary-container selection:text-on-primary-container">

<!-- ══════════════════════════════════════════
     ① HEADER
══════════════════════════════════════════ -->
<header class="glass-nav fixed top-0 left-0 right-0 z-50 border-b border-outline-variant/30">
  <div class="flex items-center gap-3 px-5 h-16 max-w-screen-2xl mx-auto">

    <!-- Logo -->
    <button id="logoBtn" class="flex-none flex items-center gap-2 group">
      <span class="text-2xl group-hover:rotate-12 transition-transform duration-300">🌸</span>
      <div class="leading-none">
        <div class="font-headline font-black text-base tracking-tighter text-primary">꽃말 사전</div>
        <div class="text-[9px] uppercase tracking-[0.15em] text-on-surface-variant font-semibold hidden sm:block">Flower Language</div>
      </div>
    </button>

    <!-- Search -->
    <div class="flex-1 relative max-w-xl mx-auto">
      <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size:18px">search</span>
      <input id="searchInput" type="text"
        placeholder="어떤 마음을 전하고 싶으세요? (예: 합격 기원, 위로, 감사)"
        class="w-full pl-10 pr-10 py-2.5 bg-surface-container rounded-full text-sm outline-none border border-outline-variant/30 focus:border-primary/40 focus:ring-2 focus:ring-primary/15 transition-all placeholder:text-on-surface-variant/60" />
      <button id="searchBtn" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
        <span class="material-symbols-outlined" style="font-size:18px">arrow_forward</span>
      </button>
    </div>

    <!-- Artificial toggle -->
    <label class="flex-none flex items-center gap-2 cursor-pointer select-none">
      <input type="checkbox" id="artificialToggle" class="sr-only" />
      <div class="toggle-track"></div>
      <div class="hidden sm:block">
        <p class="text-xs font-semibold text-on-surface leading-none">조화 모드</p>
        <p class="text-[10px] text-on-surface-variant">계절 무관</p>
      </div>
    </label>
  </div>

  <!-- Mobile theme pills -->
  <div class="lg:hidden px-5 pb-3 overflow-x-auto no-scrollbar">
    <div id="mobilePills" class="flex gap-2 w-max"></div>
  </div>
</header>


<!-- ══════════════════════════════════════════
     ② SIDEBAR (desktop only)
══════════════════════════════════════════ -->
<aside class="hidden lg:flex flex-col fixed left-0 top-0 bottom-0 w-64 z-40 bg-surface-container-low border-r border-outline-variant/20">
  <!-- top spacer for header -->
  <div class="h-16 flex-none border-b border-outline-variant/10 flex items-center px-6">
    <p class="text-[10px] font-black uppercase tracking-[0.18em] text-on-surface-variant">테마별 탐색</p>
  </div>

  <!-- Nav links -->
  <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-0.5">
    <button class="sidebar-link active" id="sidebarHome">
      <span class="material-symbols-outlined" style="font-size:20px">home</span>
      <span>홈 — 전체 보기</span>
    </button>
    <div id="sidebarNav" class="space-y-0.5 mt-1"></div>
  </nav>

  <!-- Bottom season info -->
  <div class="p-4 border-t border-outline-variant/20">
    <div id="sidebarSeason" class="bg-primary-container rounded-xl p-4 text-center">
      <p class="text-[10px] font-black uppercase tracking-widest text-on-primary-container mb-1">지금 계절</p>
      <p id="sidebarSeasonText" class="text-sm font-bold text-on-primary-container"></p>
    </div>
  </div>
</aside>


<!-- ══════════════════════════════════════════
     ③ MAIN CONTENT
══════════════════════════════════════════ -->
<main class="lg:ml-64 pt-16">
  <!-- Extra top space for mobile pills -->
  <div class="h-12 lg:hidden"></div>

  <!-- ── HOME VIEW ───────────────────────── -->
  <section id="homeView" class="view active max-w-6xl mx-auto px-5 md:px-10 py-10">

    <!-- Hero -->
    <div class="mb-16 flex flex-col md:flex-row items-start md:items-end justify-between gap-8">
      <div class="max-w-lg">
        <span class="text-[10px] font-black uppercase tracking-[0.2em] text-primary">의도에서 출발하는 꽃 추천</span>
        <h1 class="font-headline font-black text-5xl md:text-7xl tracking-tighter leading-[0.88] mt-3 mb-5">
          마음을<br/>
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-primary-fixed-dim">담은 꽃.</span>
        </h1>
        <p class="text-on-surface-variant text-base leading-relaxed">
          꽃 이름이 아닌 <strong class="text-on-surface font-semibold">상황과 의도</strong>에서 시작하는 꽃 탐색.<br/>
          성공 기원인지, 위로인지, 감사인지 — 먼저 마음을 고르세요.
        </p>
      </div>
      <div id="heroBadge" class="flex-none px-5 py-3 rounded-2xl bg-secondary-container text-on-secondary-container text-sm font-semibold"></div>
    </div>

    <!-- Seasonal horizontal scroll -->
    <section class="mb-16">
      <div class="flex items-end justify-between mb-6">
        <div>
          <h2 class="font-headline font-bold text-2xl tracking-tight">지금 이 계절의 꽃</h2>
          <p class="text-on-surface-variant text-sm mt-0.5" id="seasonSubtext"></p>
        </div>
        <div class="flex gap-2">
          <button id="scrollLeft" class="w-10 h-10 rounded-full bg-surface-container hover:bg-surface-container-high transition-colors flex items-center justify-center">
            <span class="material-symbols-outlined text-on-surface-variant" style="font-size:20px">chevron_left</span>
          </button>
          <button id="scrollRight" class="w-10 h-10 rounded-full bg-surface-container hover:bg-surface-container-high transition-colors flex items-center justify-center">
            <span class="material-symbols-outlined text-on-surface-variant" style="font-size:20px">chevron_right</span>
          </button>
        </div>
      </div>
      <div id="seasonalScroll" class="flex overflow-x-auto gap-5 pb-4 -mx-5 px-5 no-scrollbar scroll-smooth"></div>
    </section>

    <!-- Theme grid -->
    <section class="mb-16">
      <h2 class="font-headline font-bold text-2xl tracking-tight mb-6">
        어떤 마음을 전하고 싶으세요?
      </h2>
      <div id="themeGrid" class="grid grid-cols-2 sm:grid-cols-4 gap-3"></div>
    </section>

    <!-- Popular -->
    <section class="mb-16">
      <div class="flex items-end justify-between mb-6">
        <h2 class="font-headline font-bold text-2xl tracking-tight">
          인기 꽃 <span class="text-primary">TOP 8</span>
        </h2>
        <span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant" id="popModeLabel">인기순</span>
      </div>
      <div id="popularGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    </section>

  </section>

  <!-- ── THEME VIEW ──────────────────────── -->
  <section id="themeView" class="view max-w-6xl mx-auto px-5 md:px-10 py-10">

    <!-- Back + header -->
    <div class="mb-8 flex flex-col sm:flex-row sm:items-center gap-4">
      <button id="themeBack" class="flex-none flex items-center gap-2 px-4 py-2.5 rounded-full bg-surface-container-low border border-outline-variant/30 text-sm font-semibold text-on-surface-variant hover:border-primary/40 hover:text-primary transition-all">
        <span class="material-symbols-outlined" style="font-size:18px">arrow_back</span>
        돌아가기
      </button>
      <div id="themeViewHeader" class="flex items-center gap-4"></div>
    </div>

    <!-- Filter bar -->
    <div class="flex flex-wrap items-center gap-3 p-4 mb-7 rounded-xl bg-surface-container-low border border-outline-variant/20">
      <span class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant">정렬</span>
      <div id="sortGroup" class="flex gap-2">
        <button class="sort-btn active px-4 py-1.5 rounded-full text-xs font-bold border border-outline-variant/40 text-on-surface-variant transition-all" data-sort="popularity">인기순</button>
        <button class="sort-btn px-4 py-1.5 rounded-full text-xs font-bold border border-outline-variant/40 text-on-surface-variant transition-all" data-sort="season">제철순</button>
        <button class="sort-btn px-4 py-1.5 rounded-full text-xs font-bold border border-outline-variant/40 text-on-surface-variant transition-all" data-sort="name">이름순</button>
      </div>
      <div class="w-px h-5 bg-outline-variant/40 hidden sm:block"></div>
      <div id="colorFilters" class="flex flex-wrap gap-2"></div>
    </div>

    <div id="themeGrid2" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
  </section>

  <!-- ── SEARCH VIEW ─────────────────────── -->
  <section id="searchView" class="view max-w-6xl mx-auto px-5 md:px-10 py-10">

    <div class="mb-8 flex flex-wrap items-center gap-4">
      <button id="searchBack" class="flex-none flex items-center gap-2 px-4 py-2.5 rounded-full bg-surface-container-low border border-outline-variant/30 text-sm font-semibold text-on-surface-variant hover:border-primary/40 hover:text-primary transition-all">
        <span class="material-symbols-outlined" style="font-size:18px">arrow_back</span>
        돌아가기
      </button>
      <p id="searchResultInfo" class="text-base text-on-surface-variant"></p>
    </div>

    <div id="searchGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>

    <div id="searchEmpty" class="hidden text-center py-24">
      <div class="text-6xl mb-5">🌿</div>
      <p class="text-lg font-bold text-on-surface mb-2">검색 결과가 없어요</p>
      <p class="text-sm text-on-surface-variant mb-8">다른 키워드로 찾아보세요<br/>(예: 합격, 위로, 빨강, 어버이날)</p>
      <button id="showAllBtn" class="px-8 py-3 rounded-full border-2 border-primary text-primary font-bold text-sm hover:bg-primary hover:text-white transition-all">
        전체 꽃 보기
      </button>
    </div>
  </section>
</main>


<!-- ══════════════════════════════════════════
     ④ MODAL
══════════════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modal">
    <button id="modalClose"
      class="absolute top-4 right-4 w-9 h-9 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high hover:text-primary transition-all z-10">
      <span class="material-symbols-outlined" style="font-size:20px">close</span>
    </button>
    <div id="modalContent"></div>
  </div>
</div>


<!-- ══════════════════════════════════════════
     ⑤ FAB (mobile)
══════════════════════════════════════════ -->
<button id="fabSearch"
  class="lg:hidden fixed bottom-6 right-6 w-14 h-14 bg-primary text-white rounded-full shadow-2xl flex items-center justify-center z-50 hover:scale-110 active:scale-95 transition-transform duration-200">
  <span class="material-symbols-outlined" style="font-size:26px">local_florist</span>
</button>


<script src="flowers.js"></script>
<script src="app.js"></script>
</body>
</html>
